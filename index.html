  <style>
    :root {
      --primary: #ff007f;
      --accent: #001d47;
      --bg: #000c1d;
      --text: #ffffff;
      --loader-bg: #000c1d;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      height: 100dvh; overflow: hidden;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      position: relative;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }

    #main-app {
      flex: 1; width: 100%; height: 100%;
      border: none; opacity: 0;
      transition: var(--transition);
      z-index: 1;
    }

    #main-app.loaded { opacity: 1; }

    .loader-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: var(--loader-bg);
      z-index: 100; transition: var(--transition);
    }

    .spinner-box { position: relative; width: 65px; height: 65px; }

    .spinner {
      width: 100%; height: 100%;
      border: 3px solid rgba(255, 0, 127, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
      will-change: transform;
    }

    .loading-status {
      margin-top: 25px; font-size: 0.85rem;
      font-weight: 700; color: var(--primary);
      letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-overlay::before {
      content: ''; position: absolute;
      width: 300px; height: 300px;
      background: var(--primary);
      filter: blur(100px); opacity: 0.12;
      animation: pulse 2.5s infinite ease-in-out;
      will-change: transform, opacity;
    }

    @keyframes pulse { 0%, 100% { opacity: 0.08; transform: scale(1); } 50% { opacity: 0.15; transform: scale(1.2); } }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="loader-overlay" id="loader">
      <div class="spinner-box">
        <div class="spinner"></div>
      </div>
      <div class="loading-status" id="status-text">FaxGer Initializing...</div>
    </div>

    <iframe
      id="main-app"
      src="about:blank"
      title="FaxGer Global Logistics Dashboard"
      allow="geolocation; camera; clipboard-write"
      loading="eager">
    </iframe>
  </div>

  <script>
    // URL Builder Logic (Fixes the double "?" query parameter issue)
    (function() {
      const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbzFo8ao4DvF92Qcx4lhieUV80MSi7T1feLt-2jCXQstXuIhsORv1IQ6jlfAKDQCX7jA/exec?p=label";
      const browserSearch = window.location.search;
      
      let finalUrl = scriptBaseUrl;
      if (browserSearch) {
        // If the browser URL already has parameters, replace its "?" with "&" before appending
        const cleanParams = browserSearch.startsWith('?') ? browserSearch.substring(1) : browserSearch;
        finalUrl += "&" + cleanParams;
      }
      
      document.getElementById('main-app').src = finalUrl;
    })();

    const iframe = document.getElementById('main-app');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('status-text');

    // Smooth Transition Logic
    iframe.onload = function() {
      statusText.innerText = "Syncing with Server...";
      setTimeout(() => {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }, 400);
    };

    // Network Check
    window.addEventListener('offline', () => {
      statusText.innerText = "Offline - Check Connection";
      statusText.style.color = "#ff4757";
    });

    window.addEventListener('online', () => {
      statusText.innerText = "Reconnecting...";
      statusText.style.color = "var(--primary)";
    });

    // Fallback Timer (Safety net)
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }
    }, 10000);

    // iOS Scale Fix
    document.addEventListener('touchmove', function (e) {
      if (e.scale !== 1) { e.preventDefault(); }
    }, { passive: false });
  </script>
