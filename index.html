<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaxGer Global Logistics</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #content-frame { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>

    <!-- এই আইফ্রেমটি আপনার ডোমেইনের ভেতরে গুগল স্ক্রিপ্টকে মাস্ক করে রাখবে -->
    <iframe id="content-frame" src="" allow="geolocation; camera; clipboard-write"></iframe>

    <script>
        (function() {
            // ১. গুগল স্ক্রিপ্টের বেস লিঙ্ক
            const baseScript = "https://script.google.com/macros/s/AKfycbyH2dt2M5xDJVOavth-UwS3xvOjAScMhvtBBHwYuWI0XtrgDQmxaLljrc4AaY0ukS-h/exec";
            
            // ২. বর্তমান ইউআরএল থেকে প্যারামিটার (p=track ইত্যাদি) নেওয়া
            const urlParams = new URLSearchParams(window.location.search);
            const p = urlParams.get('p');

            // ৩. আইফ্রেমের সোর্স সেট করা
            const finalUrl = p ? baseScript + "?p=" + p : baseScript;
            document.getElementById('content-frame').src = finalUrl;

            // ৪. ব্রাউজারের হিস্ট্রি ম্যানেজ করা (যাতে লিঙ্ক পরিবর্তন না হয়)
            if (p) {
                const newRelativePathQuery = window.location.pathname + '?p=' + p;
                window.history.replaceState(null, '', newRelativePathQuery);
            }
        })();
    </script>
</body>
</html>
