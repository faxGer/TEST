<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- Primary Meta Tags -->
  <title>FaxGer Global Logistics | International Shipping Solutions</title>
  <meta name="title" content="FaxGer Global Logistics | International Shipping Solutions">
  <meta name="description" content="Calculate international shipping rates, track parcels, and manage logistics with FaxGer.">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.faxger.com/">
  <meta property="og:title" content="FaxGer Global Logistics - Advanced Shipping Portal">
  <meta property="og:image" content="https://drive.google.com/thumbnail?id=1YixXpA8V8ruHiqjv1dzn3lqx0REBTHwS&sz=w1200">

  <link rel="icon" href="https://lh3.googleusercontent.com/d/13QoaBni9mY0tTYPkCodu4KSqe0syFkrZ" type="image/png">

  <style>
    :root {
      --primary: #ff007f;
      --accent: #001d47;
      --bg: #000c1d;
      --text: #ffffff;
      --loader-bg: #000c1d;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      height: 100dvh;
      overflow: hidden;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      position: relative;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }

    #main-app {
      flex: 1; width: 100%; height: 100%;
      border: none; opacity: 0;
      transition: var(--transition);
      z-index: 1;
    }

    #main-app.loaded { opacity: 1; }

    .loader-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: var(--loader-bg);
      z-index: 100; transition: var(--transition);
    }

    .spinner {
      width: 65px; height: 65px;
      border: 3px solid rgba(255, 0, 127, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
    }

    .loading-status {
      margin-top: 25px; font-size: 0.85rem;
      font-weight: 700; color: var(--primary);
      letter-spacing: 2px; text-transform: uppercase;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="loader-overlay" id="loader">
      <div class="spinner"></div>
      <div class="loading-status" id="status-text">FaxGer Initializing...</div>
    </div>

    <!-- Iframe src is empty initially, handled by JS -->
    <iframe
      id="main-app"
      src=""
      title="FaxGer Global Logistics"
      allow="geolocation; camera; clipboard-write"
      loading="eager">
    </iframe>
  </div>

  <script>
    // 1. URL Parameter Logic
    function getPageUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('p'); // Get 'p' from www.faxger.com/?p=track
        const baseScript = "https://script.google.com/macros/s/AKfycbyH2dt2M5xDJVOavth-UwS3xvOjAScMhvtBBHwYuWI0XtrgDQmxaLljrc4AaY0ukS-h/exec";
        
        // If 'p' exists, append it to Google Script URL, otherwise load default
        return page ? `${baseScript}?p=${page}` : baseScript;
    }

    const iframe = document.getElementById('main-app');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('status-text');

    // 2. Load the dynamic URL
    iframe.src = getPageUrl();

    // 3. Smooth Transition
    iframe.onload = function() {
      statusText.innerText = "Syncing with Server...";
      setTimeout(() => {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }, 800);
    };

    // 4. Fallback for slow connections
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }
    }, 15000);

    // 5. iOS Scale Fix
    document.addEventListener('touchmove', function (e) {
      if (e.scale !== 1) { e.preventDefault(); }
    }, { passive: false });
  </script>

</body>
</html>
